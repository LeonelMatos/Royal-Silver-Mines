name: Build

on:
  push:
    branches:
      - '**' # regular CI on every branch
    tags:
      - 'v*.*.*' # version tags trigger a release build too
  pull_request:
  release:
    types: [published] # still supports manually publishing a release if you want

env:
  BUILD_TYPE: Release
  EM_VERSION: 2.0.18
  EM_CACHE_FOLDER: 'emsdk-cache'

jobs:

  build:

    name: ${{matrix.name}}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
            release-suffix: LIN64
            cmake-args: -D32BLIT_DIR=$GITHUB_WORKSPACE/32blit-sdk
            apt-packages: libsdl2-dev libsdl2-image-dev libsdl2-net-dev python3-setuptools
            release: true

          - os: ubuntu-22.04
            name: STM32
            release-suffix: STM32
            cmake-args: -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/32blit-sdk/32blit.toolchain
            apt-packages: gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib python3-setuptools
            release: false

          - os: ubuntu-22.04
            name: PicoSystem
            release-suffix: PICOSYSTEM
            cmake-args: -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/32blit-sdk/pico.toolchain -DPICO_BOARD=pimoroni_picosystem -DPICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk -DPICO_EXTRAS_PATH=$GITHUB_WORKSPACE/pico-extras
            apt-packages: gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib python3-setuptools
            release: true

          - os: ubuntu-22.04
            name: Emscripten
            release-suffix: WEB
            cmake-args: -D32BLIT_DIR=$GITHUB_WORKSPACE/32blit-sdk
            cmake-prefix: emcmake
            apt-packages: python3-setuptools
            release: false

          - os: macos-latest
            name: macOS
            release-suffix: MACOS
            cmake-args: -D32BLIT_DIR=$GITHUB_WORKSPACE/32blit-sdk
            brew-packages: sdl2 sdl2_image sdl2_net pipx
            release: false

          - os: windows-latest
            name: Visual Studio
            release-suffix: WIN64
            cmake-args: -D32BLIT_DIR=$GITHUB_WORKSPACE/32blit-sdk
            release: true

    runs-on: ${{matrix.os}}

    env:
      # ref_name works for both a tag push AND a published release (both carry a tag)
      RELEASE_FILE: ${{github.event.repository.name}}-${{github.ref_name}}-${{matrix.release-suffix}}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: main

    - name: Checkout 32Blit API
      uses: actions/checkout@v4
      with:
        repository: 32blit/32blit-sdk
        path: 32blit-sdk

    - name: Checkout Pico SDK
      if: matrix.name == 'PicoSystem'
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-sdk
        path: pico-sdk
        submodules: recursive

    - name: Checkout Pico Extras
      if: matrix.name == 'PicoSystem'
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-extras
        path: pico-extras
        submodules: recursive

    - name: Setup Python
      if: runner.os == 'Windows'
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Linux deps
      if: runner.os == 'Linux'
      run: |
        sudo apt update && sudo apt install ${{matrix.apt-packages}} pipx
        pipx install 32blit
        pipx ensurepath

    - name: Install macOS deps
      if: runner.os == 'macOS'
      run: |
        brew install ${{matrix.brew-packages}}
        pipx install 32blit

    - name: Install Windows deps
      if: runner.os == 'Windows'
      shell: bash
      run: |
        python -m pip install 32blit

    - name: Setup Emscripten cache
      if: matrix.name == 'Emscripten'
      id: cache-system-libraries
      uses: actions/cache@v3
      with:
        path: ${{env.EM_CACHE_FOLDER}}
        key: ${{env.EM_VERSION}}-${{runner.os}}

    - name: Setup Emscripten
      if: matrix.name == 'Emscripten'
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: ${{env.EM_VERSION}}
        actions-cache-folder: ${{env.EM_CACHE_FOLDER}}

    - name: Pre-build Emscripten ports
      if: matrix.name == 'Emscripten'
      run: embuilder.py build sdl2 sdl2-image-jpg sdl2-net

    - name: Create Build Environment
      run: cmake -E make_directory ${{runner.workspace}}/main/build

    - name: Configure CMake
      shell: bash
      working-directory: ${{runner.workspace}}/main/build
      run: ${{matrix.cmake-prefix}} cmake $GITHUB_WORKSPACE/main -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCPACK_PACKAGE_FILE_NAME=${{env.RELEASE_FILE}} ${{matrix.cmake-args}}

    - name: Build
      working-directory: ${{runner.workspace}}/main/build
      shell: bash
      run: |
        cmake --build . --config $BUILD_TYPE -j 2

    # --- Release packaging: desktop platforms (Linux, Windows) via CPack ---
    - name: Package Release
      if: matrix.release && matrix.name != 'PicoSystem' && (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/'))
      working-directory: ${{runner.workspace}}/main/build
      shell: bash
      run: |
        cmake --build . --config $BUILD_TYPE --target package

    - name: Upload Release Package
      if: matrix.release && matrix.name != 'PicoSystem' && (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          ${{runner.workspace}}/main/build/${{env.RELEASE_FILE}}.tar.gz
          ${{runner.workspace}}/main/build/${{env.RELEASE_FILE}}.zip

    # --- Release upload: PicoSystem ships a raw .uf2, no CPack involved ---
    - name: Upload PicoSystem .uf2
      if: matrix.release && matrix.name == 'PicoSystem' && (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/'))
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        files: ${{runner.workspace}}/main/build/*.uf2